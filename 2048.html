<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>2048 • Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --grid: #161b22;
      --tile: #21262d;
      --text: #c9d1d9;
      --border: #30363d;
      --accent: #6366f1;
      --accent-dark: #4f46e5;
      --shadow: rgba(0,0,0,0.6);
      --tile-2: #e0e0ff;
      --tile-4: #c3daff;
      --tile-8: #a5b4fc;
      --tile-16: #818cf8;
      --tile-32: #6366f1;
      --tile-64: #4f46e5;
      --tile-128: #7c3aed;
      --tile-256: #a855f7;
      --tile-512: #c084fc;
      --tile-1024: #d946ef;
      --tile-2048: #ec4899;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      overflow:hidden;
    }

    header {
      padding:20px 0 12px;
      text-align:center;
      width:100%;
    }

    h1 {
      font-size:clamp(2rem,8vw,3.2rem);
      background:linear-gradient(90deg,#a5b4fc,#c084fc,#ec4899);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 0 20px rgba(165,180,252,0.4);
    }

    #game-container {
      position:relative;
      width:min(90vw,420px);
      aspect-ratio:1/1;
      background:var(--grid);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 40px var(--shadow);
      border:1px solid var(--border);
      margin:12px auto;
    }

    #board {
      width:100%;
      height:100%;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      grid-template-rows:repeat(4,1fr);
      gap:12px;
      padding:16px;
      background:var(--grid);
    }

    .tile {
      background:var(--tile);
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(1.8rem,8vw,3.2rem);
      font-weight:bold;
      color:var(--bg);
      transition:all 0.12s ease;
      box-shadow:inset 0 2px 6px rgba(0,0,0,0.4);
    }

    .tile-2    { background:#e0e0ff; color:#0d1117; }
    .tile-4    { background:#c3daff; color:#0d1117; }
    .tile-8    { background:#a5b4fc; color:#0d1117; }
    .tile-16   { background:#818cf8; color:white; }
    .tile-32   { background:#6366f1; color:white; }
    .tile-64   { background:#4f46e5; color:white; }
    .tile-128  { background:#7c3aed; color:white; }
    .tile-256  { background:#a855f7; color:white; }
    .tile-512  { background:#c084fc; color:white; }
    .tile-1024 { background:#d946ef; color:white; font-size:clamp(1.4rem,6vw,2.4rem); }
    .tile-2048 { background:#ec4899; color:white; font-size:clamp(1.3rem,5.5vw,2.2rem); }

    #score-panel {
      margin:16px 0;
      font-size:clamp(1.2rem,4.5vw,1.6rem);
      text-align:center;
    }

    #game-over {
      position:absolute;
      inset:0;
      background:rgba(13,17,23,0.92);
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:#ff4444;
      font-size:clamp(3rem,12vw,5rem);
      font-weight:bold;
      text-shadow:0 0 30px #ff4444aa;
      z-index:10;
    }

    #game-over.show { display:flex; animation:fadeIn 0.6s ease; }

    @keyframes fadeIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }

    .back-btn, button {
      margin:20px auto;
      padding:14px 36px;
      font-size:clamp(1.1rem,4vw,1.4rem);
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      color:white;
      border:none;
      border-radius:16px;
      cursor:pointer;
      box-shadow:0 8px 24px rgba(99,102,241,0.4);
      transition:all 0.2s;
      text-decoration:none;
      display:inline-block;
    }

    .back-btn:active, button:active { transform:scale(0.96); }
  </style>
</head>
<body>

  <header>
    <h1>2048</h1>
  </header>

  <div id="game-container">
    <div id="board"></div>
    <div id="game-over">
      <div>GAME OVER</div>
      <button onclick="startGame()">НОВАЯ ИГРА</button>
    </div>
  </div>

  <div id="score-panel">Счёт: <span id="score">0</span></div>

  <!-- Кнопка возврата на главную страницу с играми -->
   <a href=index.html class="back-btn">← К списку игр</a>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const SIZE = 4;
    let board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
    let score = 0;
    let gameOver = false;

    const boardEl = document.getElementById('board');
    boardEl.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;

    // Создаём клетки
    for (let i = 0; i < SIZE * SIZE; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      boardEl.appendChild(tile);
    }

    const tiles = boardEl.children;

    function updateTiles() {
      for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
          const idx = i * SIZE + j;
          const value = board[i][j];
          tiles[idx].textContent = value || '';
          tiles[idx].className = 'tile';
          if (value) tiles[idx].classList.add(`tile-${value}`);
        }
      }
      document.getElementById('score').textContent = score;
    }

    function addRandomTile() {
      const empty = [];
      for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
          if (board[i][j] === 0) empty.push({i,j});
        }
      }
      if (empty.length === 0) return false;
      const {i,j} = empty[Math.floor(Math.random() * empty.length)];
      board[i][j] = Math.random() < 0.9 ? 2 : 4;
      return true;
    }

    function slide(row) {
      let newRow = row.filter(v => v !== 0);
      for (let i = 0; i < newRow.length - 1; i++) {
        if (newRow[i] === newRow[i+1]) {
          newRow[i] *= 2;
          score += newRow[i];
          newRow.splice(i+1, 1);
        }
      }
      while (newRow.length < SIZE) newRow.push(0);
      return newRow;
    }

    function move(direction) {
      if (gameOver) return false;

      let moved = false;
      let newBoard = board.map(row => row.slice());

      if (direction === 'left') {
        for (let i = 0; i < SIZE; i++) {
          const newRow = slide(board[i]);
          if (newRow.join('') !== board[i].join('')) moved = true;
          newBoard[i] = newRow;
        }
      } else if (direction === 'right') {
        for (let i = 0; i < SIZE; i++) {
          const newRow = slide(board[i].reverse()).reverse();
          if (newRow.join('') !== board[i].join('')) moved = true;
          newBoard[i] = newRow;
        }
      } else if (direction === 'up') {
        for (let j = 0; j < SIZE; j++) {
          let col = [board[0][j], board[1][j], board[2][j], board[3][j]];
          const newCol = slide(col);
          if (newCol.join('') !== col.join('')) moved = true;
          for (let i = 0; i < SIZE; i++) newBoard[i][j] = newCol[i];
        }
      } else if (direction === 'down') {
        for (let j = 0; j < SIZE; j++) {
          let col = [board[0][j], board[1][j], board[2][j], board[3][j]].reverse();
          const newCol = slide(col).reverse();
          if (newCol.join('') !== col.reverse().join('')) moved = true;
          for (let i = 0; i < SIZE; i++) newBoard[i][j] = newCol[i];
        }
      }

      board = newBoard;
      if (moved) addRandomTile();
      updateTiles();

      // Проверка на Game Over
      let canMove = false;
      for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
          if (board[i][j] === 0) canMove = true;
          if (j < SIZE-1 && board[i][j] === board[i][j+1]) canMove = true;
          if (i < SIZE-1 && board[i][j] === board[i+1][j]) canMove = true;
        }
      }
      if (!canMove && !gameOver) {
        gameOver = true;
        document.getElementById('game-over').classList.add('show');
        tg.HapticFeedback.notificationOccurred('error');
      }

      return moved;
    }

    // Управление клавиатурой (ПК)
    document.addEventListener('keydown', e => {
      if (gameOver) return;
      switch(e.key) {
        case 'ArrowUp': case 'w': case 'ц': move('up'); break;
        case 'ArrowDown': case 's': case 'ы': move('down'); break;
        case 'ArrowLeft': case 'a': case 'ф': move('left'); break;
        case 'ArrowRight': case 'd': case 'в': move('right'); break;
      }
    });

    // Управление свайпами (мобильные)
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, {passive:true});

    document.addEventListener('touchend', e => {
      if (gameOver) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 50) move('right');
        else if (dx < -50) move('left');
      } else {
        if (dy > 50) move('down');
        else if (dy < -50) move('up');
      }
    }, {passive:true});

    function startGame() {
      board = Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
      score = 0;
      gameOver = false;
      document.getElementById('game-over').classList.remove('show');
      document.getElementById('score').textContent = 0;
      addRandomTile();
      addRandomTile();
      updateTiles();
    }

    startGame();
  </script>
</body>
</html>
