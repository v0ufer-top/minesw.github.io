<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Змейка • Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --grid: #161b22;
      --snake: #58a6ff;
      --snake-head: #3b82f6;
      --food: #f85149;
      --text: #c9d1d9;
      --border: #30363d;
      --shadow: rgba(0,0,0,0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }

    h1 {
      font-size: clamp(1.8rem, 7vw, 2.8rem);
      margin: 12px 0 8px;
      background: linear-gradient(90deg, #58a6ff, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
    }

    #info {
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      opacity: 0.8;
      margin-bottom: 12px;
      text-align: center;
    }

    #game-container {
      position: relative;
      width:  min(90vw, 420px);
      height: min(90vw, 420px);
      background: var(--grid);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px var(--shadow);
      border: 1px solid var(--border);
    }

    #board {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(20, 1fr);
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.02) 10px,
        rgba(255,255,255,0.02) 20px
      );
    }

    .cell {
      background: transparent;
    }

    .snake {
      background: var(--snake);
      border-radius: 6px;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
    }

    .snake.head {
      background: var(--snake-head);
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(59,130,246,0.7);
    }

    .food {
      background: var(--food);
      border-radius: 50%;
      animation: pulse 1.2s infinite alternate;
      box-shadow: 0 0 12px rgba(248,81,73,0.6);
    }

    @keyframes pulse {
      from { transform: scale(0.85); }
      to   { transform: scale(1.15); }
    }

    #score-panel {
      margin-top: 16px;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      text-align: center;
    }

    #game-over {
      position: absolute;
      inset: 0;
      background: rgba(13,17,23,0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ff4444;
      font-size: clamp(2.8rem, 12vw, 4.5rem);
      font-weight: bold;
      text-shadow: 0 0 30px #ff4444aa;
      z-index: 10;
    }

    #game-over.show { display: flex; animation: fadeIn 0.6s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    button {
      margin-top: 20px;
      padding: 14px 40px;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(59,130,246,0.5);
      transition: all 0.2s;
    }

    button:active { transform: scale(0.96); }

    .back-btn, button {
      margin:20px auto;
      padding:14px 36px;
      font-size:clamp(1.1rem,4vw,1.4rem);
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      color:white;
      border:none;
      border-radius:16px;
      cursor:pointer;
      box-shadow:0 8px 24px rgba(99,102,241,0.4);
      transition:all 0.2s;
      text-decoration:none;
      display:inline-block;
    }

    .back-btn:active, button:active { transform:scale(0.96); }
  </style>
</head>
<body>

  <h1>Змейка</h1>
  <div id="info">Стрелки / свайпы — управление</div>

  <div id="game-container">
    <div id="board"></div>
    <div id="game-over">
      <div>GAME OVER</div>
      <button onclick="startGame()">НОВАЯ ИГРА</button>
    </div>
  </div>

  <div id="score-panel">Счёт: <span id="score">0</span></div>

    <!-- Кнопка возврата на главную страницу с играми -->
   <a href=index.html class="back-btn">← К списку игр</a>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const GRID_SIZE = 20;
    const CELL_COUNT = GRID_SIZE * GRID_SIZE;

    let snake = [{x: 10, y: 10}];
    let dx = 1, dy = 0;
    let food = {x: 15, y: 15};
    let score = 0;
    let gameOver = false;
    let gameInterval;

    const board = document.getElementById('board');
    board.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;

    // Создаём клетки один раз
    for (let i = 0; i < CELL_COUNT; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      board.appendChild(cell);
    }

    const cells = board.children;

    function getIndex(x, y) {
      return y * GRID_SIZE + x;
    }

    function render() {
      for (let cell of cells) {
        cell.className = 'cell';
      }

      // Змейка
      snake.forEach((segment, index) => {
        const idx = getIndex(segment.x, segment.y);
        cells[idx].classList.add('snake');
        if (index === 0) cells[idx].classList.add('head');
      });

      // Еда
      const foodIdx = getIndex(food.x, food.y);
      cells[foodIdx].classList.add('food');
    }

    function move() {
      if (gameOver) return;

      const head = {x: snake[0].x + dx, y: snake[0].y + dy};

      // Столкновение со стеной
      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
        endGame();
        return;
      }

      // Столкновение с собой
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      // Съели еду?
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        tg.HapticFeedback.impactOccurred('light');

        // Новая еда
        food = {x: Math.floor(Math.random()*GRID_SIZE), y: Math.floor(Math.random()*GRID_SIZE)};
        while (snake.some(s => s.x === food.x && s.y === food.y)) {
          food = {x: Math.floor(Math.random()*GRID_SIZE), y: Math.floor(Math.random()*GRID_SIZE)};
        }
      } else {
        snake.pop();
      }

      render();
    }

    function endGame() {
      gameOver = true;
      clearInterval(gameInterval);
      document.getElementById('game-over').classList.add('show');
      tg.HapticFeedback.notificationOccurred('error');
    }

    function changeDirection(newDx, newDy) {
      // Запрещаем разворот на 180°
      if (newDx === -dx && newDy === -dy) return;
      dx = newDx;
      dy = newDy;
    }

    // Управление клавиатурой (ПК)
    document.addEventListener('keydown', e => {
      if (gameOver) return;
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'ц': changeDirection(0, -1); break;
        case 'ArrowDown':  case 's': case 'ы': changeDirection(0, 1); break;
        case 'ArrowLeft':  case 'a': case 'ф': changeDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'в': changeDirection(1, 0); break;
      }
    });

    // Управление свайпами (мобильные)
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
      if (gameOver) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) changeDirection(1, 0);      // вправо
        else if (dx < -30) changeDirection(-1, 0); // влево
      } else {
        if (dy > 30) changeDirection(0, 1);      // вниз
        else if (dy < -30) changeDirection(0, -1); // вверх
      }
    }, {passive: true});

    function startGame() {
      snake = [{x: 10, y: 10}];
      dx = 1; dy = 0;
      score = 0;
      document.getElementById('score').textContent = score;
      food = {x: 15, y: 15};
      gameOver = false;
      document.getElementById('game-over').classList.remove('show');
      clearInterval(gameInterval);
      gameInterval = setInterval(move, 180); // скорость игры
      render();
    }

    // Запуск
    startGame();
  </script>
</body>
</html>
